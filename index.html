<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hobuapp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;margin:0;background:#f8fafc;color:#0f172a}
.wrap{padding:16px;max-width:900px;margin:auto}
.card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin:12px 0;overflow:hidden}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:12px;border:1px solid #cbd5e1;font-size:16px;box-sizing:border-box}
button{background:#111827;color:white;font-weight:bold}
button.light{background:white;color:#111827;border:1px solid #cbd5e1}
.muted{color:#64748b;font-size:13px}
.horseName{font-size:20px;font-weight:900}
.pedigreeWrap{width:100%;overflow-x:auto;border:1px solid #cbd5e1;border-radius:16px;background:white;-webkit-overflow-scrolling:touch}
.pedigreeTable{border-collapse:collapse;width:720px;min-width:720px;table-layout:fixed;font-size:12px}
.pedigreeTable td{border:1px solid #94a3b8;padding:8px;text-align:center;vertical-align:middle;background:#f8fafc;width:180px;word-break:break-word}
.pedigreeTable tr:nth-child(even) td{background:white}
.pedName{font-weight:900;text-transform:uppercase}
.pedHint{font-size:12px;color:#64748b;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
<h1>🐎 Hobuapp</h1>

<div id="auth" class="card">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Parool">
  <button onclick="login()">Logi sisse</button>
  <button class="light" onclick="register()">Registreeri</button>
  <p id="msg" class="muted"></p>
</div>

<div id="app" style="display:none">
  <button class="light" onclick="logout()">Logi välja</button>

  <div id="listView">
    <div class="card">
      <h3>Lisa hobune</h3>
      <input id="horseName" placeholder="Hobuse nimi">
      <button onclick="addHorse()">Lisa hobune</button>
    </div>

    <div id="horses"></div>
  </div>

  <div id="detailView" style="display:none">
    <button class="light" onclick="backToList()">← Tagasi</button>

    <div class="card">
      <div class="horseName" id="detailName"></div>
    </div>

    <div class="card">
      <h3>🧬 Sugupuu</h3>
      <div class="pedHint">Libista tabelit küljele. Kliki lahtrile, et muuta.</div>
      <div id="pedigreeBox"></div>
    </div>
  </div>
</div>
</div>

<script>
const client = supabase.createClient(
  "https://dgvuuwuvnfsifwgrbory.supabase.co",
  "sb_publishable_IT_QqzN5KGNHYJEVBmxouw_-NmtleIY"
);

let user=null;
let horses=[];
let selectedHorse=null;
let pedigree={};

const labels={
  self:"Hobune",
  sire:"Isa",
  dam:"Ema",
  sire_sire:"Isa isa",
  sire_dam:"Isa ema",
  dam_sire:"Ema isa",
  dam_dam:"Ema ema",
  sire_sire_sire:"Isa isa isa",
  sire_sire_dam:"Isa isa ema",
  sire_dam_sire:"Isa ema isa",
  sire_dam_dam:"Isa ema ema",
  dam_sire_sire:"Ema isa isa",
  dam_sire_dam:"Ema isa ema",
  dam_dam_sire:"Ema ema isa",
  dam_dam_dam:"Ema ema ema"
};

async function register(){
  const {error}=await client.auth.signUp({
    email:email.value,
    password:password.value
  });
  msg.innerText=error?error.message:"Konto loodud. Logi sisse.";
}

async function login(){
  const {data,error}=await client.auth.signInWithPassword({
    email:email.value,
    password:password.value
  });
  if(error){msg.innerText=error.message;return;}
  user=data.user;
  auth.style.display="none";
  app.style.display="block";
  loadHorses();
}

async function logout(){
  await client.auth.signOut();
  location.reload();
}

async function addHorse(){
  if(!horseName.value.trim()) return;
  const {error}=await client.from("horses").insert({
    user_id:user.id,
    name:horseName.value.trim()
  });
  if(error){alert(error.message);return;}
  horseName.value="";
  loadHorses();
}

async function loadHorses(){
  const {data,error}=await client.from("horses")
    .select("*")
    .eq("user_id",user.id);

  if(error){alert(error.message);return;}

  horses=data||[];
  document.getElementById("horses").innerHTML=horses.map(h=>`
    <div class="card" onclick="openHorse('${h.id}')">
      <div class="horseName">${h.name||"Nimetu"}</div>
      <div class="muted">Ava hobuse vaade →</div>
    </div>
  `).join("") || "<p>Hobuseid pole veel.</p>";
}

async function openHorse(id){
  selectedHorse=horses.find(h=>h.id===id);
  listView.style.display="none";
  detailView.style.display="block";
  detailName.innerText=selectedHorse.name||"Nimetu";
  await loadPedigree();
}

function backToList(){
  detailView.style.display="none";
  listView.style.display="block";
}

async function loadPedigree(){
  const {data,error}=await client.from("horse_pedigree")
    .select("*")
    .eq("user_id",user.id)
    .eq("horse_id",selectedHorse.id);

  if(error){alert(error.message);return;}

  pedigree={};
  (data||[]).forEach(p=>pedigree[p.position_key]=p.name);
  pedigree.self=selectedHorse.name||"Nimetu";
  renderPedigree();
}

function cell(key,rowspan){
  return `<td ${rowspan?`rowspan="${rowspan}"`:""} onclick="editPed('${key}')">
    <div class="muted">${labels[key]||""}</div>
    <div class="pedName">${pedigree[key]||"—"}</div>
  </td>`;
}

function renderPedigree(){
  pedigreeBox.innerHTML=`
  <div class="pedigreeWrap">
    <table class="pedigreeTable">
      <tr>
        ${cell("self",8)}
        ${cell("sire",4)}
        ${cell("sire_sire",2)}
        ${cell("sire_sire_sire",1)}
      </tr>
      <tr>${cell("sire_sire_dam",1)}</tr>
      <tr>
        ${cell("sire_dam",2)}
        ${cell("sire_dam_sire",1)}
      </tr>
      <tr>${cell("sire_dam_dam",1)}</tr>
      <tr>
        ${cell("dam",4)}
        ${cell("dam_sire",2)}
        ${cell("dam_sire_sire",1)}
      </tr>
      <tr>${cell("dam_sire_dam",1)}</tr>
      <tr>
        ${cell("dam_dam",2)}
        ${cell("dam_dam_sire",1)}
      </tr>
      <tr>${cell("dam_dam_dam",1)}</tr>
    </table>
  </div>`;
}

async function editPed(key){
  if(key==="self"){
    alert("Hobuse nime muuda hiljem hobuse üldandmetest.");
    return;
  }

  const name=prompt(labels[key]||key,pedigree[key]||"");
  if(name===null) return;

  const {data:existing}=await client.from("horse_pedigree")
    .select("id")
    .eq("user_id",user.id)
    .eq("horse_id",selectedHorse.id)
    .eq("position_key",key)
    .maybeSingle();

  let error;
  if(existing){
    ({error}=await client.from("horse_pedigree")
      .update({name})
      .eq("id",existing.id));
  }else{
    ({error}=await client.from("horse_pedigree").insert({
      user_id:user.id,
      horse_id:selectedHorse.id,
      position_key:key,
      name
    }));
  }

  if(error){alert(error.message);return;}
  await loadPedigree();
}
</script>
</body>
</html>
