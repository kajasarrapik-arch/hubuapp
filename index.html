<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hobuapp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:20px;background:#f8fafc}
.card{background:white;border:1px solid #ddd;border-radius:14px;padding:16px;margin:12px 0}
input,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ccc;font-size:16px}
button{background:#111827;color:white;font-weight:bold}
</style>
</head>
<body>

<h1>🐎 Hobuapp</h1>

<div class="card">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Parool">
  <button onclick="login()">Logi sisse</button>
  <button onclick="register()">Registreeri</button>
  <p id="msg"></p>
</div>

<div id="app" style="display:none">
  <div class="card">
    <input id="horseName" placeholder="Hobuse nimi">
    <button onclick="addHorse()">Lisa hobune</button>
  </div>
  <div id="horses"></div>
</div>

<script>
const client = supabase.createClient(
  "https://dgvuuwuvnfsifwgrbory.supabase.co",
  "sb_publishable_IT_QqzN5KGNHYJEVBmxouw_-NmtleIY"
);

let user = null;

async function register(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  const {error}=await client.auth.signUp({email,password});
  document.getElementById("msg").innerText = error ? error.message : "Konto loodud. Proovi nüüd sisse logida.";
}

async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;
  const {data,error}=await client.auth.signInWithPassword({email,password});
  if(error){
    document.getElementById("msg").innerText=error.message;
    return;
  }
  user=data.user;
  document.getElementById("app").style.display="block";
  loadHorses();
}

async function addHorse(){
  const name=document.getElementById("horseName").value;
  const {error}=await client.from("horses").insert({
    user_id:user.id,
    name:name
  });
  if(error){ alert(error.message); return; }
  document.getElementById("horseName").value="";
  loadHorses();
}

async function loadHorses(){
  const {data,error}=await client.from("horses")
    .select("*")
    .eq("user_id",user.id);

  if(error){ alert(error.message); return; }

  document.getElementById("horses").innerHTML=data.map(h=>`
    <div class="card"><b>${h.name}</b></div>
  `).join("");
}
</script>

</body>
</html>
